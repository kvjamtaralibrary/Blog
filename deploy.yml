## 👩‍💼 Admin Access

Admin panel (`admin.html`) is only accessible to: **kvjamtaralibrary@gmail.com**

Admin can:
- ✅ Approve or ❌ reject pending comments
- 📚 Add/delete books in the catalog
- 💾 Download database backup
- 📊 View library stats

---

## 🛠️ Making Changes

**Update announcements:** Edit `index.html` — look for the "Library Highlights" section.

**Change admin email:** Edit `js/auth.js` and `admin.html` — search for `kvjamtaralibrary@gmail.com`.

**Add book categories:** Edit the `<select>` in `catalog.html` and `admin.html`.

**Update styles:** Edit `css/styles.css` — CSS variables are at the top (`:root`).

