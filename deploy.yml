## 🚀 Deploy to GitHub Pages

1. **Fork or upload** this repository to GitHub
2. Go to **Settings → Pages**
3. Set Source: **Deploy from branch → main → / (root)**
4. Your site will be live at: `https://YOUR_USERNAME.github.io/kvjmt-library`

---

## 🔥 Firebase Setup

The Firebase project is already configured in `js/firebase-config.js`.

### Set Security Rules
Go to **Firebase Console → Realtime Database → Rules** and paste:

```json
{
  "rules": {
    "pending_comments": {
      ".write": "auth != null",
      ".read": "auth.token.email == 'kvjamtaralibrary@gmail.com'"
    },
    "approved_comments": {
      ".read": true,
      ".write": "auth.token.email == 'kvjamtaralibrary@gmail.com'"
    },
    "books": {
      ".read": true,
      ".write": "auth.token.email == 'kvjamtaralibrary@gmail.com'"
    },
    "leaderboard": {
      ".read": true,
      ".write": "auth != null"
    },
    "book_requests": {
      ".write": "auth != null",
      ".read": "auth.token.email == 'kvjamtaralibrary@gmail.com'"
    }
  }
}
```

### Enable Google Authentication
Firebase Console → **Authentication → Sign-in method → Google → Enable**

Add your domain to **Authorized domains** (e.g. `yourusername.github.io`).

