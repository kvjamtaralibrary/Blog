# 📚 The Open Book — PM Shri KV Jamtara Library

Official library website for **PM Shri Kendriya Vidyalaya, Jamtara, Jharkhand**.

🌐 **Live Site:** https://kvjmt-theopenbook.netlify.app/

---

## ✨ Features

| Feature | Details |
|---|---|
| 🔐 Google Login | Gmail + @kvs.gov.in accounts only |
| 💬 Secure Comments | Login required, pending admin approval |
| ⚙️ Admin Dashboard | Approve/reject comments, manage books |
| 📖 Book Catalog | Search, filter by category, get recommendations |
| 🏆 Reading Leaderboard | Track and celebrate top readers |
| 🛡️ Abuse Detection | Automatic profanity and spam filtering |
| 📱 Mobile Responsive | Works on all screen sizes |
| 💾 Data Backup | One-click JSON export from admin panel |

